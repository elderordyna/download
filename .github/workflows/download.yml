# ================================================================
#  YouTube → Google Drive  (GitHub Actions)
# ================================================================

name: YouTube → Drive

on:
  repository_dispatch:
    types: [download-video]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: Install dependencies
        run: pip install yt-dlp google-api-python-client google-auth

      - name: Download video
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          VIDEO_ID: ${{ github.event.client_payload.video_id }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt
          echo "Downloading: $VIDEO_ID"
          yt-dlp \
            -f 'best[ext=mp4]/best' \
            --merge-output-format mp4 \
            --extractor-args "youtube:player_client=ios" \
            -o '/tmp/%(title)s.%(ext)s' \
            --no-playlist \
            --no-warnings \
            "https://www.youtube.com/watch?v=${VIDEO_ID}"

      - name: Upload to Google Drive
        env:
          SA_JSON:    ${{ secrets.GOOGLE_SA_JSON }}
          USER_EMAIL: ${{ github.event.client_payload.user_email }}
        run: |
          python3 - << 'PYEOF'
          import os, glob, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          sa_info = json.loads(os.environ['SA_JSON'])
          creds   = service_account.Credentials.from_service_account_info(
              sa_info, scopes=['https://www.googleapis.com/auth/drive.file'])
          drive   = build('drive', 'v3', credentials=creds)

          files = glob.glob('/tmp/*.mp4')
          if not files:
              raise SystemExit('ERROR: no mp4 file found in /tmp')

          file_path = files[0]
          file_name = os.path.basename(file_path)
          size_mb   = round(os.path.getsize(file_path) / 1_000_000, 1)
          print(f'Uploading: {file_name} ({size_mb} MB)')

          media    = MediaFileUpload(file_path, mimetype='video/mp4',
                                     resumable=True, chunksize=10*1024*1024)
          uploaded = drive.files().create(
              body={'name': file_name},
              media_body=media,
              fields='id,name'
          ).execute()

          file_id = uploaded['id']
          print(f'Uploaded. Drive file ID: {file_id}')

          user_email = os.environ.get('USER_EMAIL', '').strip()
          if user_email:
              drive.permissions().create(
                  fileId=file_id,
                  body={'type': 'user', 'role': 'writer', 'emailAddress': user_email},
                  sendNotificationEmail=False
              ).execute()
              print(f'Shared with: {user_email}')

          print('Done!')
          PYEOF
