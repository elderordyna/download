name: YouTube → Drive

on:
  repository_dispatch:
    types: [download-video]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: Debug payload
        run: |
          echo "videoId:   ${{ github.event.client_payload.videoId }}"
          echo "title:     ${{ github.event.client_payload.title }}"

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth google-auth-oauthlib

      - name: Download and upload to Drive
        env:
          VIDEO_ID:             ${{ github.event.client_payload.videoId }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json, time, requests
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          video_id  = os.environ['VIDEO_ID']
          folder_id = '1EuhneFQwGBJmJ2kDByEUk9Zy6fIN1ken'
          yt_url    = f'https://www.youtube.com/watch?v={video_id}'

          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              'Referer':    'https://cnvmp3.com/v54',
              'Origin':     'https://cnvmp3.com',
          })

          # Step 0: Visit page to get session cookie
          print('Starting session...')
          session.get('https://cnvmp3.com/v54', timeout=30)

          # Step 1: Get video title
          print(f'Getting video info: {video_id}')
          r1 = session.post(
              'https://cnvmp3.com/get_video_data.php',
              json={'url': yt_url, 'token': '1234'},
              timeout=30
          )
          r1.raise_for_status()
          d1 = r1.json()
          if not d1.get('success'):
              raise Exception(f'get_video_data failed: {d1}')
          title = d1['title']
          print(f'Title: {title}')

          # Step 2: Get download link
          # Tries 720p → 480p → 360p, retries up to 3 times with 15s wait between attempts
          download_url = None
          d2 = {}
          for attempt in range(1, 4):
              print(f'Attempt {attempt}/3...')
              for quality in [720, 480, 360]:
                  print(f'  Trying {quality}p...')
                  r2 = session.post(
                      'https://cnvmp3.com/download_video_ucep.php',
                      json={'url': yt_url, 'quality': quality, 'title': title, 'formatValue': 0},
                      timeout=120
                  )
                  r2.raise_for_status()
                  d2 = r2.json()
                  if d2.get('success'):
                      download_url = d2['download_link']
                      print(f'  Got download link at {quality}p')
                      break
                  else:
                      print(f'  {quality}p failed: {d2.get("error", "unknown")}')
              if download_url:
                  break
              if attempt < 3:
                  print(f'All qualities failed, waiting 15s before retry...')
                  time.sleep(15)

          if not download_url:
              raise Exception(f'All attempts failed. Last error: {d2}')

          print(f'Download URL: {download_url}')

          # Step 3: Download the MP4
          print('Downloading file...')
          safe_title = "".join(c for c in title if c not in r'\/:*?"<>|').strip()
          file_name  = f'{safe_title}.mp4'
          file_path  = f'/tmp/{file_name}'

          with session.get(download_url, stream=True, timeout=600) as r:
              r.raise_for_status()
              with open(file_path, 'wb') as f:
                  downloaded = 0
                  for chunk in r.iter_content(chunk_size=10 * 1024 * 1024):
                      f.write(chunk)
                      downloaded += len(chunk)
                      print(f'  {round(downloaded / 1e6, 1)} MB...')

          size_mb = round(os.path.getsize(file_path) / 1e6, 1)
          print(f'Download complete: {file_name} ({size_mb} MB)')

          # Step 4: Upload to Google Drive
          print('Uploading to Drive...')
          creds = Credentials(
              token=None,
              refresh_token=os.environ['GOOGLE_REFRESH_TOKEN'],
              token_uri='https://oauth2.googleapis.com/token',
              client_id=os.environ['GOOGLE_CLIENT_ID'],
              client_secret=os.environ['GOOGLE_CLIENT_SECRET'],
              scopes=['https://www.googleapis.com/auth/drive']
          )
          creds.refresh(Request())

          drive    = build('drive', 'v3', credentials=creds)
          media    = MediaFileUpload(file_path, mimetype='video/mp4',
                                     resumable=True, chunksize=10 * 1024 * 1024)
          uploaded = drive.files().create(
              body={'name': file_name, 'parents': [folder_id]},
              media_body=media,
              fields='id,name'
          ).execute()

          print(f'Done! "{file_name}" is in your YouTube Downloads folder.')
          PYEOF
