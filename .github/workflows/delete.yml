name: Delete from Drive

on:
  repository_dispatch:
    types: [delete-video]

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Delete file(s) from Drive
        env:
          FILE_NAMES:           ${{ toJSON(github.event.client_payload.fileNames) }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build

          folder_id  = '1EuhneFQwGBJmJ2kDByEUk9Zy6fIN1ken'
          file_names = json.loads(os.environ.get('FILE_NAMES', '[]'))

          if not file_names:
              print('No files to delete.')
              exit(0)

          creds = Credentials(
              token=None,
              refresh_token=os.environ['GOOGLE_REFRESH_TOKEN'],
              token_uri='https://oauth2.googleapis.com/token',
              client_id=os.environ['GOOGLE_CLIENT_ID'],
              client_secret=os.environ['GOOGLE_CLIENT_SECRET'],
              scopes=['https://www.googleapis.com/auth/drive']
          )
          creds.refresh(Request())
          drive = build('drive', 'v3', credentials=creds)

          print(f'Deleting {len(file_names)} file(s)...')

          for file_name in file_names:
              print(f'  Searching: {file_name}')

              # Search in YouTube Downloads folder first
              results = drive.files().list(
                  q=f"name='{file_name}' and '{folder_id}' in parents and trashed=false",
                  fields='files(id,name)'
              ).execute()
              files = results.get('files', [])

              # Fall back to all of Drive
              if not files:
                  results = drive.files().list(
                      q=f"name='{file_name}' and trashed=false",
                      fields='files(id,name)'
                  ).execute()
                  files = results.get('files', [])

              if not files:
                  print(f'  Not found: {file_name}')
              else:
                  for f in files:
                      drive.files().delete(fileId=f['id']).execute()
                      print(f'  ✅ Deleted: {f["name"]}')

          print('Done!')
          PYEOF
